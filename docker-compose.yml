# Pre-filled starter for the extra-credit pipeline exam.
#
# What's already done for you:
#   - Four services declared: api, worker, db, redis
#   - A NAMED VOLUME `pipeline_data` mounted in BOTH api and worker at /data.
#     Stages will read/write files under /data/<job_id>/ and both containers see them.
#
# What you still need to wire up:
#   - Environment variables for DB/Redis URLs in api and worker
#   - Healthchecks for db and redis
#   - depends_on conditions for api and worker so they wait for db + redis to be HEALTHY
#   - The actual command for each service (api: flask run; worker: rq worker)
#   - Anything else the spec requires

services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - pipeline_data:/data
    # TODO: environment, depends_on, command

  worker:
    build: .
    volumes:
      - pipeline_data:/data
    # TODO: environment, depends_on, command

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    # TODO: healthcheck

  redis:
    image: redis:7
    # TODO: healthcheck

volumes:
  pipeline_data:
